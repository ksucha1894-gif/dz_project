<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Каталог</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <style>
      /* Фиксируем ширину меню */
      #menu {
          width: 1000px;
          min-width: 1000px;
          height: 100vh;
          position: fixed;
          left: 0;
          top: 0;
          overflow-y: auto;
      }
      /* Основной контент смещаем вправо */
      .main-container {
          display: flex;
          min-height: 100vh;
      }
      .container {
          margin-left: 320px;
          padding: 20px;
          flex-grow: 1;
          margin-right: 50px;
      }
      /* Стили для заголовка - добавлен сдвиг вправо */
      .catalog-title {
          text-align: center;
          margin-bottom: 2rem;
          padding-right: 10px; /* Сдвиг на несколько миллиметров */
      }
      /* Стили для карточек */
      .card-row {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 20px;
          margin-bottom: 20px;
      }
      .card-col {
          width: 45%;
          margin-bottom: 20px;
      }
      /* Стиль для заглушки вместо изображения */
      .card-placeholder {
          height: 150px;
          background-color: #f8f9fa;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #6c757d;
          font-weight: bold;
          border-top-left-radius: 10px;
          border-top-right-radius: 10px;
      }
      /* Стили для карточки */
      .card {
          border-radius: 10px;
          overflow: hidden; /* Важно для корректного скругления углов */
      }
      .card-body {
          border-bottom-left-radius: 10px;
          border-bottom-right-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <nav id="menu">
        <script>
          fetch('menu.html')
            .then(response => response.text())
            .then(data => {
              document.getElementById('menu').innerHTML = data;
            });
        </script>
      </nav>
      <div class="container">
        <h1 class="catalog-title">Каталог</h1>
        <div class="card-row" id="cards-container">
          <!-- Карточки будут вставлены сюда -->
        </div>
        <script>
          const cardTemplate = `
            <div class="card-col">
              <div class="card" style="width: 22rem;">
                <div class="card-placeholder bg-dark text-white">Thumbnail</div>
                <div class="card-body">
                  <p class="card-text">This is a wider card with supporting text below as a natural lead-in to
                                        additional content. This content is a little bit longer.</p>
                  <div class="d-flex justify-content-between align-items-center">
                    <div>
                      <button type="button" class="btn btn-outline-secondary me-2">View</button>
                      <button type="button" class="btn btn-outline-secondary">Edit</button>
                    </div>
                    <small class="text-muted">9 min</small>
                  </div>
                </div>
              </div>
            </div>
          `;
          const container = document.getElementById('cards-container');
          for (let i = 0; i < 4; i++) {
            container.insertAdjacentHTML('beforeend', cardTemplate);
          }
        </script>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
